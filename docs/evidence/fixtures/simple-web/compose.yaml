services:
  web:
    image: docker.io/library/nginx:1.27-alpine
    ports:
      - "127.0.0.1:18080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
    labels:
      com.container-compose-adapter.pilot.workload: simple-web
