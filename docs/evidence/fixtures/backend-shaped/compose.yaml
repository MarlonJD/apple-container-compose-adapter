services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: app
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    labels:
      com.container-compose-adapter.pilot.workload: backend-shaped
      com.container-compose-adapter.pilot.role: db

  migrate:
    image: docker.io/library/postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: dev_password
    command:
      - sh
      - -ec
      - |
        psql -h db -U app -d app -v ON_ERROR_STOP=1 \
          -c "create table if not exists pilot_items (id serial primary key, name text not null);"
    labels:
      com.container-compose-adapter.pilot.workload: backend-shaped
      com.container-compose-adapter.pilot.role: migrate

  seed:
    image: docker.io/library/postgres:16-alpine
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: dev_password
    command:
      - sh
      - -ec
      - |
        psql -h db -U app -d app -v ON_ERROR_STOP=1 \
          -c "insert into pilot_items (name) values ('public-fixture') on conflict do nothing;"
    labels:
      com.container-compose-adapter.pilot.workload: backend-shaped
      com.container-compose-adapter.pilot.role: seed

  api:
    image: docker.io/library/python:3.12-alpine
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:18081:8080"
    command:
      - python
      - -c
      - |
        import http.server
        import socket
        import time

        deadline = time.time() + 30
        while True:
            try:
                with socket.create_connection(("db", 5432), timeout=2):
                    break
            except OSError:
                if time.time() > deadline:
                    raise
                time.sleep(1)

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_GET(self):
                if self.path not in ("/", "/ready"):
                    self.send_response(404)
                    self.end_headers()
                    return
                body = b"ready\n"
                self.send_response(200)
                self.send_header("Content-Type", "text/plain")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

            def log_message(self, format, *args):
                return

        http.server.ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/ready', timeout=2).read()"
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
    labels:
      com.container-compose-adapter.pilot.workload: backend-shaped
      com.container-compose-adapter.pilot.role: api

volumes:
  db-data:
    labels:
      com.container-compose-adapter.pilot.workload: backend-shaped
